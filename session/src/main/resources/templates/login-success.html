<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 완료</title>
</head>
<body>
<h1>로그인 완료</h1>
<p><strong th:text="${name}">사용자</strong> 님 환영합니다.</p>
<p>신규 회원 여부: <span th:text="${isNewUser}">false</span></p>

<p>토큰이 브라우저 localStorage에 저장되었습니다.</p>

<script th:inline="javascript">
    const accessToken = [[${accessToken}]];
    const userName = [[${name}]];

    localStorage.setItem("accessToken", accessToken);
    localStorage.setItem("userName", userName);

    console.log("저장된 accessToken:", accessToken);
    console.log("저장된 userName:", userName);
</script>

<hr>
<p>브라우저 개발자도구 Console 또는 Application → Local Storage에서 확인할 수 있습니다.</p>
</body>
</html>
